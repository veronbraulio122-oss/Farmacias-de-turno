<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Farmacia de Turno - Comandante Andresito</title>

<link rel="stylesheet" href="style.css">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">

<body>

<div class="card">

<!-- Logo Municipio -->
<img src="img/logo-andresito.png" class="logo-municipio" alt="Comandante Andresito">

<h1>Farmacia de Turno</h1>

<!-- Logo Red -->
<img src="img/redfarmako.png" class="logo-red" alt="Red Farmako">

<div id="nombre-farmacia" class="nombre-farmacia">
Cargando...
</div>

<button id="btn-maps" class="btn btn-maps">
Cómo llegar
</button>

<button id="btn-wpp" class="btn btn-wpp">
WhatsApp
</button>

<footer class="footer">
© 2026 Braulio · Comandante Andresito
</footer>

</div>

<script src="script.js"></script>
