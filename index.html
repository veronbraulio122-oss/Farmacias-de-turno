<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
    <title>Farmacia de Turno - Comandante Andresito</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        :root {
            --primary: #72bd99; 
            --primary-hover: #5da684;
            --bg-body: #ffffff; 
            --card-bg: #fafafa;
            --text-main: #0f172a;
            --text-muted: #64748b;
            --border-color: rgba(0, 0, 0, 0.03);
            --radius-lg: 32px;
            --radius-md: 18px;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-body);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 15px; /* Menos padding lateral en el body */
            color: var(--text-main);
        }

        .card {
            background: var(--card-bg);
            width: 100%; /* Ocupa todo el ancho disponible */
            max-width: 420px; /* Pero no se estira de más en PC */
            border-radius: var(--radius-lg);
            padding: 40px 24px; /* Padding ajustado para mobile */
            box-shadow: 
                0 4px 6px -1px rgba(0, 0, 0, 0.05),
                0 10px 20px -5px rgba(0, 0, 0, 0.1),
                0 30px 45px -10px rgba(0, 0, 0, 0.15),
                inset 0 1px 1px rgba(255, 255, 255, 0.9);
            border: 1px solid var(--border-color);
            text-align: center;
            position: relative;
            animation: fadeInFloating 0.8s ease-out;
        }

        .logo-municipio {
            height: 48px;
            margin-bottom: 24px;
            object-fit: contain;
            opacity: 0.9;
        }

        .localidad {
            font-size: 0.75rem;
            font-weight: 700;
            color: var(--primary);
            text-transform: uppercase;
            letter-spacing: 0.12em;
            margin-bottom: 12px;
        }

        h1 {
            font-size: 1.75rem; /* Un poco más chico para que no rompa en pantallas angostas */
            font-weight: 800;
            letter-spacing: -0.03em;
            color: var(--text-main);
            margin-bottom: 16px;
            line-height: 1.1;
        }

        .info {
            font-size: 0.85rem;
            line-height: 1.5;
            color: var(--text-muted);
            margin-bottom: 30px;
        }

        .fecha {
            background-color: #f1f5f9;
            border: 1px solid rgba(0, 0, 0, 0.03);
            padding: 12px 20px;
            border-radius: var(--radius-md);
            font-weight: 600;
            font-size: 0.9rem;
            color: var(--text-main);
            margin-bottom: 35px;
            display: inline-block;
            width: auto;
        }

        .logo-red {
            height: 28px;
            margin-bottom: 12px;
            opacity: 0.7;
            object-fit: contain;
        }

        .nombre-farmacia {
            font-size: 1.6rem;
            font-weight: 700;
            color: var(--text-main);
            margin-bottom: 35px;
            min-height: 40px;
            line-height: 1.2;
        }

        .btn {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            padding: 18px;
            border-radius: var(--radius-md);
            font-size: 1rem;
            font-weight: 700;
            border: none;
            cursor: pointer;
            transition: all 0.25s ease;
            gap: 12px;
            margin-bottom: 12px;
        }

        .btn-maps {
            background-color: var(--primary);
            color: white;
            box-shadow: 0 4px 14px rgba(114, 189, 153, 0.35);
        }

        .btn-wpp {
            background-color: white;
            color: #1a1a1a;
            border: 1px solid rgba(0, 0, 0, 0.08);
        }

        /* Footer casi invisible pedido */
        .footer {
            margin-top: 35px;
            font-size: 0.7rem;
            color: var(--text-muted);
            opacity: 0.25; 
            font-weight: 500;
        }

        /* Ajustes extra para pantallas muy pequeñas (iPhone SE, etc) */
        @media (max-width: 360px) {
            .card { padding: 30px 20px; }
            h1 { font-size: 1.5rem; }
            .nombre-farmacia { font-size: 1.4rem; }
        }

        @keyframes fadeInFloating {
            0% { opacity: 0; transform: translateY(20px); }
            100% { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

<div class="card">
    <img src="img/logo-andresito.png" class="logo-municipio" alt="Logo Municipio">

    <div class="localidad">Comandante Andresito</div>

    <h1>Farmacia de Turno</h1>

    <p class="info">
        Turnos rotativos 08:00 AM.<br>
        Guardia las 24 horas.
    </p>

    <div id="fecha" class="fecha"></div>

    <img src="img/redfarmako.png" class="logo-red" alt="Red Farmako">

    <div id="nombre-farmacia" class="nombre-farmacia">Cargando...</div>

    <button id="btn-maps" class="btn btn-maps">
        <i class="fa-solid fa-location-dot"></i> Cómo llegar
    </button>

    <button id="btn-wpp" class="btn btn-wpp">
        <i class="fa-brands fa-whatsapp"></i> WhatsApp
    </button>

    <footer class="footer">
        © 2026 Braulio · Comandante Andresito
    </footer>
</div>

<script src="script.js"></script>

</body>
</html>
